<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List of Arcs</title>
</head>
<body>
<h1>All the arcs</h1>
<table>
    <tr>
        <th><h2>Name</h2></th>
    </tr>
    <tr th:each="arc:${arcs}">
        <td th:text="${arc.name}"></td>
    </tr>
</table>

</body>
</html>
